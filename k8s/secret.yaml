# DO NOT commit real values.
# Create this secret once with:
#   kubectl create secret generic corpact-secrets \
#     --from-literal=DB_HOST=your-rds-endpoint \
#     --from-literal=DB_USER=corpact \
#     --from-literal=DB_PASSWORD=your-password \
#     --from-literal=SQS_QUEUE_URL=https://... \
#     --from-literal=API_SECRET_KEY=your-secret \
#     -n corpact
#
# This file is a reference only — the actual Secret is managed outside Git.
apiVersion: v1
kind: Secret
metadata:
  name: corpact-secrets
  namespace: corpact
type: Opaque
stringData:
  DB_HOST: "REPLACE_ME"
  DB_USER: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  SQS_QUEUE_URL: "REPLACE_ME"
  API_SECRET_KEY: "REPLACE_ME"
