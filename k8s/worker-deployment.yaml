apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: corpact
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: YOUR_ECR_URI:latest   # replaced by CI
          command: ["python", "-m", "app.worker.main"]
          envFrom:
            - configMapRef:
                name: corpact-config
            - secretRef:
                name: corpact-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
